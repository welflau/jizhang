<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户认证系统</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #666;
            font-weight: 500;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input.error {
            border-color: #f44336;
        }

        .error-message {
            color: #f44336;
            font-size: 12px;
            margin-top: 5px;
        }

        .success-message {
            color: #4caf50;
            font-size: 12px;
            margin-top: 5px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
        }

        .checkbox-group label {
            margin: 0;
            font-size: 14px;
            color: #666;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .link {
            text-align: center;
            margin-top: 15px;
        }

        .link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .dashboard {
            text-align: center;
        }

        .dashboard h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .user-info {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .user-info p {
            color: #666;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .user-info strong {
            color: #333;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_BASE_URL = 'http://localhost:8000';

        // 登录组件
        function LoginForm({ onSuccess, onSwitchToRegister, onForgotPassword }) {
            const [formData, setFormData] = useState({
                username: '',
                password: '',
                rememberMe: false
            });
            const [errors, setErrors] = useState({});
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');

            const handleChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: type === 'checkbox' ? checked : value
                }));
                setErrors(prev => ({ ...prev, [name]: '' }));
            };

            const validate = () => {
                const newErrors = {};
                if (!formData.username.trim()) {
                    newErrors.username = '请输入邮箱或手机号';
                }
                if (!formData.password) {
                    newErrors.password = '请输入密码';
                }
                return newErrors;
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const newErrors = validate();
                if (Object.keys(newErrors).length > 0) {
                    setErrors(newErrors);
                    return;
                }

                setLoading(true);
                setMessage('');

                try {
                    const response = await fetch(`${API_BASE_URL}/auth/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: new URLSearchParams({
                            username: formData.username,
                            password: formData.password
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        if (formData.rememberMe) {
                            localStorage.setItem('token', data.access_token);
                            localStorage.setItem('user', JSON.stringify(data.user));
                        } else {
                            sessionStorage.setItem('token', data.access_token);
                            sessionStorage.setItem('user', JSON.stringify(data.user));
                        }
                        onSuccess(data);
                    } else {
                        setMessage(data.detail || '登录失败，请检查用户名和密码');
                    }
                } catch (error) {
                    setMessage('网络错误，请稍后重试');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <form onSubmit={handleSubmit}>
                    {message && <div className="alert alert-error">{message}</div>}
                    
                    <div className="form-group">
                        <label>邮箱/手机号</label>
                        <input
                            type="text"
                            name="username"
                            value={formData.username}
                            onChange={handleChange}
                            className={errors.username ? 'error' : ''}
                            placeholder="请输入邮箱或手机号"
                        />
                        {errors.username && <div className="error-message">{errors.username}</div>}
                    </div>

                    <div className="form-group">
                        <label>密码</label>
                        <input
                            type="password"
                            name="password"
                            value={formData.password}
                            onChange={handleChange}
                            className={errors.password ? 'error' : ''}
                            placeholder="请输入密码"
                        />
                        {errors.password && <div className="error-message">{errors.password}</div>}
                    </div>

                    <div className="checkbox-group">
                        <input
                            type="checkbox"
                            name="rememberMe"
                            id="rememberMe"
                            checked={formData.rememberMe}
                            onChange={handleChange}
                        />
                        <label htmlFor="rememberMe">记住登录状态</label>
                    </div>

                    <button type="submit" className="btn btn-primary" disabled={loading}>
                        {loading ? '登录中...' : '登录'}
                    </button>

                    <div className="link">
                        <a href="#" onClick={(e) => { e.preventDefault(); onForgotPassword(); }}>
                            忘记密码？
                        </a>
                    </div>

                    <div className="link">
                        还没有账号？
                        <a href="#" onClick={(e) => { e.preventDefault(); onSwitchToRegister(); }}>
                            立即注册
                        </a>
                    </div>
                </form>
            );
        }

        // 注册组件
        function RegisterForm({ onSuccess, onSwitchToLogin }) {
            const [formData, setFormData] = useState({
                email: '',
                phone: '',
                password: '',
                confirmPassword: ''
            });
            const [errors, setErrors] = useState({});
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
                setErrors(prev => ({ ...prev, [name]: '' }));
            };

            const validate = () => {
                const newErrors = {};
                
                if (!formData.email && !formData.phone) {
                    newErrors.email = '请至少填写邮箱或手机号';
                    newErrors.phone = '请至少填写邮箱或手机号';
                }

                if (formData.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) {
                    newErrors.email = '邮箱格式不正确';
                }

                if (formData.phone && !/^1[3-9]\d{9}$/.test(formData.phone)) {
                    newErrors.phone = '手机号格式不正确';
                }

                if (!formData.password) {
                    newErrors.password = '请输入密码';
                } else if (formData.password.length < 6) {
                    newErrors.password = '密码长度至少6位';
                }

                if (formData.password !== formData.confirmPassword) {
                    newErrors.confirmPassword = '两次密码输入不一致';
                }

                return newErrors;
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const newErrors = validate();
                if (Object.keys(newErrors).length > 0) {
                    setErrors(newErrors);
                    return;
                }

                setLoading(true);
                setMessage('');

                try {
                    const response = await fetch(`${API_BASE_URL}/auth/register`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            email: formData.email || null,
                            phone: formData.phone || null,
                            password: formData.password
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        setMessage('注册成功！即将跳转到登录页面...');
                        setTimeout(() => {
                            onSwitchToLogin();
                        }, 2000);
                    } else {
                        setMessage(data.detail || '注册失败，请稍后重试');
                    }
                } catch (error) {
                    setMessage('网络错误，请稍后重试');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <form onSubmit={handleSubmit}>
                    {message && (
                        <div className={`alert ${message.includes('成功') ? 'alert-success' : 'alert-error'}`}>
                            {message}
                        </div>
                    )}
                    
                    <div className="form-group">
                        <label>邮箱</label>
                        <input
                            type="email"
                            name="email"
                            value={formData.email}
                            onChange={handleChange}
                            className={errors.email ? 'error' : ''}
                            placeholder="请输入邮箱"
                        />
                        {errors.email && <div className="error-message">{errors.email}</div>}
                    </div>

                    <div className="form-group">
                        <label>手机号</label>
                        <input
                            type="tel"
                            name="phone"
                            value={formData.phone}
                            onChange={handleChange}
                            className={errors.phone ? 'error' : ''}
                            placeholder="请输入手机号"
                        />
                        {errors.phone && <div className="error-message">{errors.phone}</div>}
                    </div>

                    <div className="form-group">
                        <label>密码</label>
                        <input
                            type="password"
                            name="password"
                            value={formData.password}
                            onChange={handleChange}
                            className={errors.password ? 'error' : ''}
                            placeholder="请输入密码（至少6位）"
                        />
                        {errors.password && <div className="error-message">{errors.password}</div>}
                    </div>

                    <div className="form-group">
                        <label>确认密码</label>
                        <input
                            type="password"
                            name="confirmPassword"
                            value={formData.confirmPassword}
                            onChange={handleChange}
                            className={errors.confirmPassword ? 'error' : ''}
                            placeholder="请再次输入密码"
                        />
                        {errors.confirmPassword && <div className="error-message">{errors.confirmPassword}</div>}
                    </div>

                    <button type="submit" className="btn btn-primary" disabled={loading}>
                        {loading ? '注册中...' : '注册'}
                    </button>

                    <div className="link">
                        已有账号？
                        <a href="#" onClick={(e) => { e.preventDefault(); onSwitchToLogin(); }}>
                            立即登录
                        </a>
                    </div>
                </form>
            );
        }

        // 忘记密码组件
        function ForgotPasswordForm({ onBack }) {
            const [step, setStep] = useState(1);
            const [formData, setFormData] = useState({
                username: '',
                code: '',
                newPassword: '',
                confirmPassword: ''
            });
            const [errors, setErrors] = useState({});
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
                setErrors(prev => ({ ...prev, [name]: '' }));
            };

            const handleSendCode = async (e) => {
                e.preventDefault();
                if (!formData.username.trim()) {
                    setErrors({ username: '请输入邮箱或手机号' });
                    return;
                }

                setLoading(true);
                setMessage('');

                try {
                    const response = await fetch(`${API_BASE_URL}/auth/forgot-password`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ username: formData.username })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        setMessage('验证码已发送，请查收');
                        setStep(2);
                    } else {
                        setMessage(data.detail || '发送失败，请稍后重试');
                    }
                } catch (error) {
                    setMessage('网络错误，请稍后重试');
                } finally {
                    setLoading(false);
                }
            };

            const handleResetPassword = async (e) => {
                e.preventDefault();
                const newErrors = {};

                if (!formData.code.trim()) {
                    newErrors.code = '请输入验证码';
                }
                if (!formData.newPassword) {
                    newErrors.newPassword = '请输入新密码';
                } else if (formData.newPassword.length < 6) {
                    newErrors.newPassword = '密码长度至少6位';
                }
                if (formData.newPassword !== formData.confirmPassword) {
                    newErrors.confirmPassword = '两次密码输入不一致';
                }

                if (Object.keys(newErrors).length > 0) {
                    setErrors(newErrors);
                    return;
                }

                setLoading(true);
                setMessage('');

                try {
                    const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            username: formData.username,
                            code: formData.code,
                            new_password: formData.newPassword
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        setMessage('密码重置成功！即将返回登录页面...');
                        setTimeout(() => {
                            onBack();
                        }, 2000);
                    } else {
                        setMessage(data.detail || '重置失败，请检查验证码');
                    }
                } catch (error) {
                    setMessage('网络错误，请稍后重试');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div>
                    {message && (
                        <div className={`alert ${message.includes('成功') ? 'alert-success' : 'alert-error'}`}>
                            {message}
                        </div>
                    )}

                    {step === 1 ? (
                        <form onSubmit={handleSendCode}>
                            <div className="form-group">
                                <label>邮箱/手机号</label>
                                <input
                                    type="text"
                                    name="username"
                                    value={formData.username}
                                    onChange={handleChange}
                                    className={errors.username ? 'error' : ''}
                                    placeholder="请输入注册时的邮箱或手机号"
                                />
                                {errors.username && <div className="error-message">{errors.username}</div>}
                            </div>

                            <button type="submit" className="btn btn-primary" disabled={loading}>
                                {loading ? '发送中...' : '发送验证码'}
                            </button>
                        </form>
                    ) : (
                        <form onSubmit={handleResetPassword}>
                            <div className="form-group">
                                <label>验证码</label>
                                <input
                                    type="text"
                                    name="code"
                                    value={formData.code}
                                    onChange={handleChange}
                                    className={errors.code ? 'error' : ''}
                                    placeholder="请输入验证码"
                                />
                                {errors.code && <div className="error-message">{errors.code}</div>}
                            </div>

                            <div className="form-group">
                                <label>新密码</label>
                                <input
                                    type="password"
                                    name="newPassword"
                                    value={formData.newPassword}
                                    onChange={handleChange}
                                    className={errors.newPassword ? 'error' : ''}
                                    placeholder="请输入新密码（至少6位）"
                                />
                                {errors.newPassword && <div className="error-message">{errors.newPassword}</div>}
                            </div>

                            <div className="form-group">
                                <label>确认新密码</label>
                                <input
                                    type="password"
                                    name="confirmPassword"
                                    value={formData.confirmPassword}
                                    onChange={handleChange}
                                    className={errors.confirmPassword ? 'error' : ''}
                                    placeholder="请再次输入新密码"
                                />
                                {errors.confirmPassword && <div className="error-message">{errors.confirmPassword}</div>}
                            </div>

                            <button type="submit" className="btn btn-primary" disabled={loading}>
                                {loading ? '重置中...' : '重置密码'}
                            </button>
                        </form>
                    )}

                    <button type="button" className="btn btn-secondary" onClick={onBack}>
                        返回登录
                    </button>
                </div>
            );
        }

        // 用户仪表盘
        function Dashboard({ user, onLogout }) {
            return (
                <div className="dashboard">
                    <h2>欢迎回来！</h2>
                    <div className="user-info">
                        <p><strong>用户ID:</strong> {user.id}</p>
                        {user.email && <p><strong>邮箱:</strong> {user.email}</p>}
                        {user.phone && <p><strong>手机号:</strong> {user.phone}</p>}
                        <p><strong>注册时间:</strong> {new Date(user.created_at).toLocaleString('zh-CN')}</p>
                    </div>
                    <button className="btn btn-primary" onClick={onLogout}>
                        退出登录
                    </button>
                </div>
            );
        }

        // 主应用组件
        function App() {
            const [currentView, setCurrentView] = useState('login');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                checkAuth();
            }, []);

            const checkAuth = async () => {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                const savedUser = localStorage.getItem('user') || sessionStorage.getItem('user');

                if (token && savedUser) {
                    try {
                        const response = await fetch(`${API_BASE_URL}/auth/me`, {
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });

                        if (response.ok) {
                            const userData = await response.json();
                            setUser(userData);
                        } else {
                            localStorage.removeItem('token');
                            localStorage.removeItem('user');
                            sessionStorage.removeItem('token');
                            sessionStorage.removeItem('user');
                        }
                    } catch (error) {
                        console.error('Auth check failed:', error);
                    }
                }
                setLoading(false);
            };

            const handleLoginSuccess = (data) => {
                setUser(data.user);
            };

            const handleLogout = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                sessionStorage.removeItem('token');
                sessionStorage.removeItem('user');
                setUser(null);
                setCurrentView('login');
            };

            if (loading) {
                return (
                    <div className="container">
                        <div className="loading">加载中...</div>
                    </div>
                );
            }

            if (user) {
                return (
                    <div className="container">
                        <Dashboard user={user} onLogout={handleLogout} />
                    </div>
                );
            }

            return (
                <div className="container">
                    <div className="header">
                        <h1>用户认证系统</h1>
                        <p>安全、便捷的用户管理平台</p>
                    </div>

                    {currentView === 'login' && (
                        <>
                            <div className="tabs">
                                <div className="tab active">登录</div>
                            </div>
                            <LoginForm
                                onSuccess={handleLoginSuccess}
                                onSwitchToRegister={() => setCurrentView('register')}
                                onForgotPassword={() => setCurrentView('forgot')}
                            />
                        </>
                    )}

                    {currentView === 'register' && (
                        <>
                            <div className="tabs">
                                <div className="tab active">注册</div>
                            </div>
                            <RegisterForm
                                onSuccess={() => setCurrentView('login')}
                                onSwitchToLogin={() => setCurrentView('login')}
                            />
                        </>
                    )}

                    {currentView === 'forgot' && (
                        <>
                            <div className="tabs">
                                <div className="tab active">找回密码</div>
                            </div>
                            <ForgotPasswordForm
                                onBack={() => setCurrentView('login')}
                            />
                        </>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
