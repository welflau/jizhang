<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户认证系统</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #root {
            width: 100%;
            max-width: 450px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: #666;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .tab.active {
            color: #667eea;
            font-weight: 600;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            color: #666;
            font-size: 14px;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .link {
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            animation: slideIn 0.3s ease-out;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .dashboard {
            text-align: center;
        }

        .dashboard h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .user-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .user-info p {
            color: #666;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .user-info strong {
            color: #333;
        }

        .btn-logout {
            background: #dc3545;
        }

        .btn-logout:hover {
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_URL = 'http://localhost:8000';

        function App() {
            const [view, setView] = useState('login');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                checkAuth();
            }, []);

            const checkAuth = async () => {
                const token = localStorage.getItem('token');
                if (token) {
                    try {
                        const response = await fetch(`${API_URL}/auth/me`, {
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });
                        if (response.ok) {
                            const data = await response.json();
                            setUser(data);
                        } else {
                            localStorage.removeItem('token');
                        }
                    } catch (error) {
                        console.error('Auth check failed:', error);
                        localStorage.removeItem('token');
                    }
                }
                setLoading(false);
            };

            const handleLogout = () => {
                localStorage.removeItem('token');
                setUser(null);
                setView('login');
            };

            if (loading) {
                return (
                    <div className="container">
                        <div className="loading">加载中...</div>
                    </div>
                );
            }

            if (user) {
                return <Dashboard user={user} onLogout={handleLogout} />;
            }

            return (
                <div className="container">
                    <div className="header">
                        <h1>用户认证系统</h1>
                        <p>安全、快速、可靠的身份验证</p>
                    </div>
                    <div className="tabs">
                        <button 
                            className={`tab ${view === 'login' ? 'active' : ''}`}
                            onClick={() => setView('login')}
                        >
                            登录
                        </button>
                        <button 
                            className={`tab ${view === 'register' ? 'active' : ''}`}
                            onClick={() => setView('register')}
                        >
                            注册
                        </button>
                    </div>
                    {view === 'login' && <LoginForm onSuccess={setUser} onForgotPassword={() => setView('forgot')} />}
                    {view === 'register' && <RegisterForm onSuccess={() => setView('login')} />}
                    {view === 'forgot' && <ForgotPasswordForm onBack={() => setView('login')} />}
                </div>
            );
        }

        function LoginForm({ onSuccess, onForgotPassword }) {
            const [formData, setFormData] = useState({
                username: '',
                password: '',
                remember: false
            });
            const [message, setMessage] = useState({ type: '', text: '' });
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setMessage({ type: '', text: '' });
                setLoading(true);

                try {
                    const response = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            username: formData.username,
                            password: formData.password
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        localStorage.setItem('token', data.access_token);
                        setMessage({ type: 'success', text: '登录成功！' });
                        setTimeout(() => {
                            onSuccess(data.user);
                        }, 1000);
                    } else {
                        setMessage({ type: 'error', text: data.detail || '登录失败，请检查用户名和密码' });
                    }
                } catch (error) {
                    setMessage({ type: 'error', text: '网络错误，请稍后重试' });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <form onSubmit={handleSubmit}>
                    {message.text && (
                        <div className={`alert alert-${message.type}`}>
                            {message.text}
                        </div>
                    )}
                    <div className="form-group">
                        <label>邮箱/手机号</label>
                        <input
                            type="text"
                            placeholder="请输入邮箱或手机号"
                            value={formData.username}
                            onChange={(e) => setFormData({...formData, username: e.target.value})}
                            required
                        />
                    </div>
                    <div className="form-group">
                        <label>密码</label>
                        <input
                            type="password"
                            placeholder="请输入密码"
                            value={formData.password}
                            onChange={(e) => setFormData({...formData, password: e.target.value})}
                            required
                        />
                    </div>
                    <div className="checkbox-group">
                        <input
                            type="checkbox"
                            id="remember"
                            checked={formData.remember}
                            onChange={(e) => setFormData({...formData, remember: e.target.checked})}
                        />
                        <label htmlFor="remember">记住登录状态</label>
                    </div>
                    <button type="submit" className="btn" disabled={loading}>
                        {loading ? '登录中...' : '登录'}
                    </button>
                    <div className="link" onClick={onForgotPassword}>
                        忘记密码？
                    </div>
                </form>
            );
        }

        function RegisterForm({ onSuccess }) {
            const [formData, setFormData] = useState({
                username: '',
                email: '',
                phone: '',
                password: '',
                confirmPassword: ''
            });
            const [message, setMessage] = useState({ type: '', text: '' });
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setMessage({ type: '', text: '' });

                if (formData.password !== formData.confirmPassword) {
                    setMessage({ type: 'error', text: '两次输入的密码不一致' });
                    return;
                }

                if (formData.password.length < 6) {
                    setMessage({ type: 'error', text: '密码长度至少为6位' });
                    return;
                }

                setLoading(true);

                try {
                    const response = await fetch(`${API_URL}/auth/register`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            username: formData.username,
                            email: formData.email,
                            phone: formData.phone,
                            password: formData.password
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        setMessage({ type: 'success', text: '注册成功！请登录' });
                        setTimeout(() => {
                            onSuccess();
                        }, 1500);
                    } else {
                        setMessage({ type: 'error', text: data.detail || '注册失败，请重试' });
                    }
                } catch (error) {
                    setMessage({ type: 'error', text: '网络错误，请稍后重试' });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <form onSubmit={handleSubmit}>
                    {message.text && (
                        <div className={`alert alert-${message.type}`}>
                            {message.text}
                        </div>
                    )}
                    <div className="form-group">
                        <label>用户名</label>
                        <input
                            type="text"
                            placeholder="请输入用户名"
                            value={formData.username}
                            onChange={(e) => setFormData({...formData, username: e.target.value})}
                            required
                        />
                    </div>
                    <div className="form-group">
                        <label>邮箱</label>
                        <input
                            type="email"
                            placeholder="请输入邮箱"
                            value={formData.email}
                            onChange={(e) => setFormData({...formData, email: e.target.value})}
                            required
                        />
                    </div>
                    <div className="form-group">
                        <label>手机号</label>
                        <input
                            type="tel"
                            placeholder="请输入手机号"
                            value={formData.phone}
                            onChange={(e) => setFormData({...formData, phone: e.target.value})}
                        />
                    </div>
                    <div className="form-group">
                        <label>密码</label>
                        <input
                            type="password"
                            placeholder="请输入密码（至少6位）"
                            value={formData.password}
                            onChange={(e) => setFormData({...formData, password: e.target.value})}
                            required
                        />
                    </div>
                    <div className="form-group">
                        <label>确认密码</label>
                        <input
                            type="password"
                            placeholder="请再次输入密码"
                            value={formData.confirmPassword}
                            onChange={(e) => setFormData({...formData, confirmPassword: e.target.value})}
                            required
                        />
                    </div>
                    <button type="submit" className="btn" disabled={loading}>
                        {loading ? '注册中...' : '注册'}
                    </button>
                </form>
            );
        }

        function ForgotPasswordForm({ onBack }) {
            const [step, setStep] = useState(1);
            const [formData, setFormData] = useState({
                email: '',
                code: '',
                newPassword: '',
                confirmPassword: ''
            });
            const [message, setMessage] = useState({ type: '', text: '' });
            const [loading, setLoading] = useState(false);

            const handleSendCode = async (e) => {
                e.preventDefault();
                setMessage({ type: '', text: '' });
                setLoading(true);

                try {
                    const response = await fetch(`${API_URL}/auth/forgot-password`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email: formData.email })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        setMessage({ type: 'success', text: '验证码已发送到您的邮箱' });
                        setStep(2);
                    } else {
                        setMessage({ type: 'error', text: data.detail || '发送失败，请重试' });
                    }
                } catch (error) {
                    setMessage({ type: 'error', text: '网络错误，请稍后重试' });
                } finally {
                    setLoading(false);
                }
            };

            const handleResetPassword = async (e) => {
                e.preventDefault();
                setMessage({ type: '', text: '' });

                if (formData.newPassword !== formData.confirmPassword) {
                    setMessage({ type: 'error', text: '两次输入的密码不一致' });
                    return;
                }

                setLoading(true);

                try {
                    const response = await fetch(`${API_URL}/auth/reset-password`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            email: formData.email,
                            code: formData.code,
                            new_password: formData.newPassword
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        setMessage({ type: 'success', text: '密码重置成功！请登录' });
                        setTimeout(() => {
                            onBack();
                        }, 1500);
                    } else {
                        setMessage({ type: 'error', text: data.detail || '重置失败，请重试' });
                    }
                } catch (error) {
                    setMessage({ type: 'error', text: '网络错误，请稍后重试' });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div>
                    {message.text && (
                        <div className={`alert alert-${message.type}`}>
                            {message.text}
                        </div>
                    )}
                    {step === 1 ? (
                        <form onSubmit={handleSendCode}>
                            <div className="form-group">
                                <label>邮箱</label>
                                <input
                                    type="email"
                                    placeholder="请输入注册时的邮箱"
                                    value={formData.email}
                                    onChange={(e) => setFormData({...formData, email: e.target.value})}
                                    required
                                />
                            </div>
                            <button type="submit" className="btn" disabled={loading}>
                                {loading ? '发送中...' : '发送验证码'}
                            </button>
                        </form>
                    ) : (
                        <form onSubmit={handleResetPassword}>
                            <div className="form-group">
                                <label>验证码</label>
                                <input
                                    type="text"
                                    placeholder="请输入邮箱收到的验证码"
                                    value={formData.code}
                                    onChange={(e) => setFormData({...formData, code: e.target.value})}
                                    required
                                />
                            </div>
                            <div className="form-group">
                                <label>新密码</label>
                                <input
                                    type="password"
                                    placeholder="请输入新密码"
                                    value={formData.newPassword}
                                    onChange={(e) => setFormData({...formData, newPassword: e.target.value})}
                                    required
                                />
                            </div>
                            <div className="form-group">
                                <label>确认新密码</label>
                                <input
                                    type="password"
                                    placeholder="请再次输入新密码"
                                    value={formData.confirmPassword}
                                    onChange={(e) => setFormData({...formData, confirmPassword: e.target.value})}
                                    required
                                />
                            </div>
                            <button type="submit" className="btn" disabled={loading}>
                                {loading ? '重置中...' : '重置密码'}
                            </button>
                        </form>
                    )}
                    <div className="link" onClick={onBack}>
                        返回登录
                    </div>
                </div>
            );
        }

        function Dashboard({ user, onLogout }) {
            return (
                <div className="container">
                    <div className="dashboard">
                        <h2>欢迎回来！</h2>
                        <div className="user-info">
                            <p><strong>用户名：</strong>{user.username}</p>
                            <p><strong>邮箱：</strong>{user.email}</p>
                            {user.phone && <p><strong>手机号：</strong>{user.phone}</p>}
                            <p><strong>注册时间：</strong>{new Date(user.created_at).toLocaleString('zh-CN')}</p>
                        </div>
                        <button className="btn btn-logout" onClick={onLogout}>
                            退出登录
                        </button>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
