<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f3460;
            --highlight: #e94560;
            --text: #eee;
            --text-muted: #aaa;
            --border: #333;
            --success: #2ecc71;
            --error: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--secondary);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: var(--accent);
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .content {
            padding: 32px 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--highlight);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
            font-family: 'Courier New', monospace;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--highlight);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        .btn:hover {
            background: #d63851;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--accent);
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: #0d2a4d;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .message.success {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .message.error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            transition: color 0.3s, border-color 0.3s;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--highlight);
            border-bottom-color: var(--highlight);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .user-info {
            background: var(--primary);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .user-info .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 16px;
            overflow: hidden;
        }

        .user-info .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .user-info .info-row:last-child {
            border-bottom: none;
        }

        .user-info .label {
            color: var(--text-muted);
            font-size: 14px;
        }

        .user-info .value {
            color: var(--text);
            font-size: 14px;
            font-weight: 500;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                max-width: 100%;
            }

            .content {
                padding: 24px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>User Management</h1>
            <p id="header-subtitle">Welcome back</p>
        </div>
        <div class="content">
            <!-- Auth View (Login/Register) -->
            <div id="auth-view">
                <div class="tabs">
                    <button class="tab active" data-tab="login">Login</button>
                    <button class="tab" data-tab="register">Register</button>
                </div>

                <div id="message-container"></div>

                <!-- Login Tab -->
                <div id="login-tab" class="tab-content active">
                    <form id="login-form">
                        <div class="form-group">
                            <label for="login-username">Username or Email</label>
                            <input type="text" id="login-username" required>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Password</label>
                            <input type="password" id="login-password" required>
                        </div>
                        <button type="submit" class="btn">Login</button>
                    </form>
                </div>

                <!-- Register Tab -->
                <div id="register-tab" class="tab-content">
                    <form id="register-form">
                        <div class="form-group">
                            <label for="register-username">Username</label>
                            <input type="text" id="register-username" minlength="3" maxlength="30" required>
                        </div>
                        <div class="form-group">
                            <label for="register-email">Email</label>
                            <input type="email" id="register-email" required>
                        </div>
                        <div class="form-group">
                            <label for="register-password">Password</label>
                            <input type="password" id="register-password" minlength="6" required>
                        </div>
                        <button type="submit" class="btn">Register</button>
                    </form>
                </div>
            </div>

            <!-- Profile View (After Login) -->
            <div id="profile-view" class="hidden">
                <div class="user-info">
                    <div class="avatar" id="user-avatar">
                        <span id="avatar-placeholder">👤</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Username:</span>
                        <span class="value" id="info-username">-</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Email:</span>
                        <span class="value" id="info-email">-</span>
                    </div>
                    <div class="info-row">
                        <span class="label">Nickname:</span>
                        <span class="value" id="info-nickname">-</span>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab active" data-tab="profile-edit">Edit Profile</button>
                    <button class="tab" data-tab="password-change">Change Password</button>
                    <button class="tab" data-tab="preferences">Preferences</button>
                </div>

                <div id="profile-message-container"></div>

                <!-- Edit Profile Tab -->
                <div id="profile-edit-tab" class="tab-content active">
                    <form id="profile-edit-form">
                        <div class="form-group">
                            <label for="edit-nickname">Nickname</label>
                            <input type="text" id="edit-nickname" maxlength="50">
                        </div>
                        <div class="form-group">
                            <label for="edit-avatar">Avatar URL</label>
                            <input type="url" id="edit-avatar" maxlength="500">
                        </div>
                        <button type="submit" class="btn">Update Profile</button>
                    </form>
                </div>

                <!-- Change Password Tab -->
                <div id="password-change-tab" class="tab-content">
                    <form id="password-change-form">
                        <div class="form-group">
                            <label for="current-password">Current Password</label>
                            <input type="password" id="current-password" required>
                        </div>
                        <div class="form-group">
                            <label for="new-password">New Password</label>
                            <input type="password" id="new-password" minlength="6" required>
                        </div>
                        <div class="form-group">
                            <label for="confirm-password">Confirm New Password</label>
                            <input type="password" id="confirm-password" minlength="6" required>
                        </div>
                        <button type="submit" class="btn">Change Password</button>
                    </form>
                </div>

                <!-- Preferences Tab -->
                <div id="preferences-tab" class="tab-content">
                    <form id="preferences-form">
                        <div class="form-group">
                            <label for="preferences-json">Preferences (JSON format)</label>
                            <textarea id="preferences-json" placeholder='{"theme": "dark", "language": "en"}'></textarea>
                        </div>
                        <button type="submit" class="btn">Save Preferences</button>
                    </form>
                </div>

                <button id="logout-btn" class="btn btn-secondary">Logout</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        let currentToken = localStorage.getItem('access_token');
        let currentUser = null;

        // Utility functions
        function showMessage(message, type = 'success', container = 'message-container') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = message;
            const containerEl = document.getElementById(container);
            containerEl.innerHTML = '';
            containerEl.appendChild(messageDiv);
            setTimeout(() => messageDiv.remove(), 5000);
        }

        async function apiRequest(endpoint, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };

            if (currentToken && !options.skipAuth) {
                headers['Authorization'] = `Bearer ${currentToken}`;
            }

            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    ...options,
                    headers
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Request failed');
                }

                return data;
            } catch (error) {
                console.error('API request failed:', error);
                throw error;
            }
        }

        function switchView(viewId) {
            document.getElementById('auth-view').classList.toggle('hidden', viewId !== 'auth-view');
            document.getElementById('profile-view').classList.toggle('hidden', viewId !== 'profile-view');
        }

        function updateUserInfo(user) {
            currentUser = user;
            document.getElementById('info-username').textContent = user.username;
            document.getElementById('info-email').textContent = user.email;
            document.getElementById('info-nickname').textContent = user.nickname || 'Not set';
            document.getElementById('header-subtitle').textContent = `Welcome, ${user.nickname || user.username}`;

            // Update avatar
            const avatarContainer = document.getElementById('user-avatar');
            const placeholder = document.getElementById('avatar-placeholder');
            if (user.avatar_url) {
                avatarContainer.innerHTML = `<img src="${user.avatar_url}" alt="Avatar">`;
            } else {
                avatarContainer.innerHTML = '<span id="avatar-placeholder">👤</span>';
            }

            // Populate edit form
            document.getElementById('edit-nickname').value = user.nickname || '';
            document.getElementById('edit-avatar').value = user.avatar_url || '';

            // Populate preferences
            if (user.preferences) {
                document.getElementById('preferences-json').value = JSON.stringify(user.preferences, null, 2);
            }
        }

        async function loadUserProfile() {
            try {
                const user = await apiRequest('/users/me');
                updateUserInfo(user);
                switchView('profile-view');
            } catch (error) {
                console.error('Failed to load user profile:', error);
                logout();
            }
        }

        function logout() {
            currentToken = null;
            currentUser = null;
            localStorage.removeItem('access_token');
            switchView('auth-view');
            document.getElementById('header-subtitle').textContent = 'Welcome back';
        }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                const parentTabs = tab.parentElement;
                const container = parentTabs.nextElementSibling;

                // Update active tab
                parentTabs.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // Update active content
                const contents = container.parentElement.querySelectorAll('.tab-content');
                contents.forEach(content => {
                    content.classList.remove('active');
                    if (content.id === `${tabName}-tab`) {
                        content.classList.add('active');
                    }
                });
            });
        });

        // Login form
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await apiRequest('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ username, password }),
                    skipAuth: true
                });

                currentToken = response.access_token;
                localStorage.setItem('access_token', currentToken);
                updateUserInfo(response.user);
                switchView('profile-view');
                showMessage('Login successful!', 'success', 'profile-message-container');
            } catch (error) {
                showMessage(error.message, 'error');
            }
        });

        // Register form
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            try {
                const response = await apiRequest('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({ username, email, password }),
                    skipAuth: true
                });

                currentToken = response.access_token;
                localStorage.setItem('access_token', currentToken);
                updateUserInfo(response.user);
                switchView('profile-view');
                showMessage('Registration successful!', 'success', 'profile-message-container');
            } catch (error) {
                showMessage(error.message, 'error');
            }
        });

        // Profile edit form
        document.getElementById('profile-edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nickname = document.getElementById('edit-nickname').value;
            const avatar_url = document.getElementById('edit-avatar').value;

            try {
                const updateData = {};
                if (nickname) updateData.nickname = nickname;
                if (avatar_url) updateData.avatar_url = avatar_url;

                const user = await apiRequest('/users/me', {
                    method: 'PUT',
                    body: JSON.stringify(updateData)
                });

                updateUserInfo(user);
                showMessage('Profile updated successfully!', 'success', 'profile-message-container');
            } catch (error) {
                showMessage(error.message, 'error', 'profile-message-container');
            }
        });

        // Password change form
        document.getElementById('password-change-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                showMessage('New passwords do not match', 'error', 'profile-message-container');
                return;
            }

            try {
                await apiRequest('/users/me', {
                    method: 'PUT',
                    body: JSON.stringify({
                        current_password: currentPassword,
                        new_password: newPassword
                    })
                });

                showMessage('Password changed successfully!', 'success', 'profile-message-container');
                document.getElementById('password-change-form').reset();
            } catch (error) {
                showMessage(error.message, 'error', 'profile-message-container');
            }
        });

        // Preferences form
        document.getElementById('preferences-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const preferencesText = document.getElementById('preferences-json').value;

            try {
                const preferences = JSON.parse(preferencesText);
                const user = await apiRequest('/users/me', {
                    method: 'PUT',
                    body: JSON.stringify({ preferences })
                });

                updateUserInfo(user);
                showMessage('Preferences saved successfully!', 'success', 'profile-message-container');
            } catch (error) {
                if (error instanceof SyntaxError) {
                    showMessage('Invalid JSON format', 'error', 'profile-message-container');
                } else {
                    showMessage(error.message, 'error', 'profile-message-container');
                }
            }
        });

        // Logout button
        document.getElementById('logout-btn').addEventListener('click', logout);

        // Initialize on page load
        if (currentToken) {
            loadUserProfile();
        }
    </script>
</body>
</html>
