<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Management</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --success: #34a853;
            --danger: #ea4335;
            --warning: #fbbc04;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text: #202124;
            --text-secondary: #5f6368;
            --border: #dadce0;
            --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: var(--surface);
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            color: var(--primary);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--text-secondary);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .card {
            background: var(--surface);
            padding: 24px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 16px;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--text);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
        }

        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border);
            margin: 10px 0;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .alert-success {
            background: #e6f4ea;
            color: #137333;
            border-left: 4px solid var(--success);
        }

        .alert-error {
            background: #fce8e6;
            color: #c5221f;
            border-left: 4px solid var(--danger);
        }

        .hidden {
            display: none;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-info img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-details h3 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .user-details p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .auth-container {
            max-width: 400px;
            margin: 100px auto;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px 4px 0 0;
            cursor: pointer;
            font-weight: 500;
        }

        .tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .header {
                flex-direction: column;
                gap: 12px;
            }

            .user-info {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Auth View -->
    <div id="auth-view" class="auth-container">
        <div class="card">
            <h1 style="text-align: center; margin-bottom: 20px;">User Management</h1>
            <div class="tabs">
                <div class="tab active" onclick="switchAuthTab('login')">Login</div>
                <div class="tab" onclick="switchAuthTab('register')">Register</div>
            </div>
            
            <div id="auth-alert"></div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="hidden">
                <div class="form-group">
                    <label for="register-username">Username</label>
                    <input type="text" id="register-username" pattern="[a-zA-Z0-9_]+" required>
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Password (min 6 characters)</label>
                    <input type="password" id="register-password" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
            </form>
        </div>
    </div>

    <!-- Main App View -->
    <div id="app-view" class="hidden">
        <div class="container">
            <div class="header">
                <h1>User Profile</h1>
                <button class="btn btn-secondary" onclick="logout()">Logout</button>
            </div>

            <div id="app-alert"></div>

            <!-- Current User Info -->
            <div class="card">
                <h2>Current User</h2>
                <div class="user-info">
                    <img id="current-avatar" src="https://via.placeholder.com/60" alt="Avatar">
                    <div class="user-details">
                        <h3 id="current-nickname">Loading...</h3>
                        <p id="current-username">@username</p>
                        <p id="current-email">email@example.com</p>
                    </div>
                </div>
            </div>

            <!-- Update Profile -->
            <div class="card">
                <h2>Update Profile</h2>
                <form id="profile-form">
                    <div class="form-group">
                        <label for="nickname">Nickname</label>
                        <input type="text" id="nickname" maxlength="50">
                    </div>
                    <div class="form-group">
                        <label for="avatar-url">Avatar URL</label>
                        <input type="url" id="avatar-url" placeholder="https://example.com/avatar.jpg">
                        <img id="avatar-preview" class="avatar-preview hidden" alt="Avatar Preview">
                    </div>
                    <button type="submit" class="btn btn-primary">Update Profile</button>
                </form>
            </div>

            <!-- Update Password -->
            <div class="card">
                <h2>Change Password</h2>
                <form id="password-form">
                    <div class="form-group">
                        <label for="current-password">Current Password</label>
                        <input type="password" id="current-password" required>
                    </div>
                    <div class="form-group">
                        <label for="new-password">New Password (min 6 characters)</label>
                        <input type="password" id="new-password" minlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Change Password</button>
                </form>
            </div>

            <!-- Update Preferences -->
            <div class="card">
                <h2>Preferences</h2>
                <form id="preferences-form">
                    <div class="form-group">
                        <label for="preferences-json">Preferences (JSON format)</label>
                        <textarea id="preferences-json" rows="6" placeholder='{"theme": "dark", "language": "en"}'></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Update Preferences</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        let currentUser = null;
        let authToken = null;

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            authToken = localStorage.getItem('auth_token');
            if (authToken) {
                loadCurrentUser();
            } else {
                showAuthView();
            }

            // Setup form handlers
            document.getElementById('login-form').addEventListener('submit', handleLogin);
            document.getElementById('register-form').addEventListener('submit', handleRegister);
            document.getElementById('profile-form').addEventListener('submit', handleUpdateProfile);
            document.getElementById('password-form').addEventListener('submit', handleUpdatePassword);
            document.getElementById('preferences-form').addEventListener('submit', handleUpdatePreferences);

            // Avatar preview
            document.getElementById('avatar-url').addEventListener('input', (e) => {
                const url = e.target.value;
                const preview = document.getElementById('avatar-preview');
                if (url) {
                    preview.src = url;
                    preview.classList.remove('hidden');
                } else {
                    preview.classList.add('hidden');
                }
            });
        });

        // Auth tab switching
        function switchAuthTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'login') {
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('register-form').classList.add('hidden');
            } else {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('register-form').classList.remove('hidden');
            }
        }

        // API helpers
        async function apiRequest(endpoint, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };

            if (authToken) {
                headers['Authorization'] = `Bearer ${authToken}`;
            }

            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    ...options,
                    headers
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Request failed');
                }

                return data;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        function showAlert(message, type = 'success', containerId = 'app-alert') {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        function showAuthView() {
            document.getElementById('auth-view').classList.remove('hidden');
            document.getElementById('app-view').classList.add('hidden');
        }

        function showAppView() {
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');
        }

        // Auth handlers
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                const data = await apiRequest('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ username, password })
                });

                authToken = data.access_token;
                localStorage.setItem('auth_token', authToken);
                currentUser = data.user;
                
                showAppView();
                displayUserInfo();
                showAlert('Login successful!', 'success');
            } catch (error) {
                showAlert(error.message, 'error', 'auth-alert');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            try {
                const data = await apiRequest('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({ username, email, password })
                });

                authToken = data.access_token;
                localStorage.setItem('auth_token', authToken);
                currentUser = data.user;
                
                showAppView();
                displayUserInfo();
                showAlert('Registration successful!', 'success');
            } catch (error) {
                showAlert(error.message, 'error', 'auth-alert');
            }
        }

        function logout() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('auth_token');
            showAuthView();
        }

        // User data handlers
        async function loadCurrentUser() {
            try {
                currentUser = await apiRequest('/users/me');
                showAppView();
                displayUserInfo();
            } catch (error) {
                console.error('Failed to load user:', error);
                logout();
            }
        }

        function displayUserInfo() {
            if (!currentUser) return;

            document.getElementById('current-nickname').textContent = currentUser.nickname || currentUser.username;
            document.getElementById('current-username').textContent = `@${currentUser.username}`;
            document.getElementById('current-email').textContent = currentUser.email;
            
            const avatarUrl = currentUser.avatar_url || 'https://via.placeholder.com/60';
            document.getElementById('current-avatar').src = avatarUrl;

            // Populate form fields
            document.getElementById('nickname').value = currentUser.nickname || '';
            document.getElementById('avatar-url').value = currentUser.avatar_url || '';
            
            if (currentUser.avatar_url) {
                document.getElementById('avatar-preview').src = currentUser.avatar_url;
                document.getElementById('avatar-preview').classList.remove('hidden');
            }

            document.getElementById('preferences-json').value = JSON.stringify(currentUser.preferences || {}, null, 2);
        }

        async function handleUpdateProfile(e) {
            e.preventDefault();
            const nickname = document.getElementById('nickname').value.trim();
            const avatar_url = document.getElementById('avatar-url').value.trim();

            const payload = {};
            if (nickname) payload.nickname = nickname;
            if (avatar_url) payload.avatar_url = avatar_url;

            if (Object.keys(payload).length === 0) {
                showAlert('Please provide at least one field to update', 'error');
                return;
            }

            try {
                currentUser = await apiRequest('/users/me/profile', {
                    method: 'PATCH',
                    body: JSON.stringify(payload)
                });
                displayUserInfo();
                showAlert('Profile updated successfully!', 'success');
            } catch (error) {
                showAlert(error.message, 'error');
            }
        }

        async function handleUpdatePassword(e) {
            e.preventDefault();
            const current_password = document.getElementById('current-password').value;
            const new_password = document.getElementById('new-password').value;

            try {
                await apiRequest('/users/me/password', {
                    method: 'PATCH',
                    body: JSON.stringify({ current_password, new_password })
                });
                showAlert('Password changed successfully!', 'success');
                document.getElementById('password-form').reset();
            } catch (error) {
                showAlert(error.message, 'error');
            }
        }

        async function handleUpdatePreferences(e) {
            e.preventDefault();
            const preferencesText = document.getElementById('preferences-json').value;

            try {
                const preferences = JSON.parse(preferencesText);
                currentUser = await apiRequest('/users/me/preferences', {
                    method: 'PATCH',
                    body: JSON.stringify({ preferences })
                });
                displayUserInfo();
                showAlert('Preferences updated successfully!', 'success');
            } catch (error) {
                if (error instanceof SyntaxError) {
                    showAlert('Invalid JSON format', 'error');
                } else {
                    showAlert(error.message, 'error');
                }
            }
        }
    </script>
</body>
</html>
