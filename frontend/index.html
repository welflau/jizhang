<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>访客追踪系统</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    :root {
      --primary: #1a1a2e;
      --secondary: #16213e;
      --accent: #0f3460;
      --highlight: #e94560;
      --text: #eee;
      --border: #444;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .stats-card {
      background: var(--accent);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 30px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .stat-item {
      text-align: center;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
    }
    
    .stat-value {
      font-size: 2.5rem;
      font-weight: bold;
      color: var(--highlight);
    }
    
    .stat-label {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-top: 5px;
    }
    
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }
    
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }
    
    .btn-primary {
      background: var(--highlight);
      color: white;
    }
    
    .btn-primary:hover {
      background: #d63651;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(233, 69, 96, 0.3);
    }
    
    .btn-secondary {
      background: #2a9d8f;
      color: white;
    }
    
    .btn-secondary:hover {
      background: #238276;
      transform: translateY(-2px);
    }
    
    .btn-danger {
      background: #e76f51;
      color: white;
    }
    
    .btn-danger:hover {
      background: #d65a3f;
      transform: translateY(-2px);
    }
    
    .records-table {
      background: var(--accent);
      border-radius: 12px;
      padding: 25px;
      overflow-x: auto;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    
    th {
      background: rgba(255,255,255,0.05);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }
    
    tr:hover {
      background: rgba(255,255,255,0.03);
    }
    
    .visit-counter {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 20px;
      background: var(--highlight);
      color: white;
      border-radius: 25px;
      font-weight: bold;
      box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
      z-index: 1000;
    }
    
    .message {
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
      display: none;
    }
    
    .message.success {
      background: rgba(42, 157, 143, 0.2);
      border-left: 4px solid #2a9d8f;
    }
    
    .message.error {
      background: rgba(231, 111, 81, 0.2);
      border-left: 4px solid #e76f51;
    }
    
    .message.show {
      display: block;
    }
    
    input[type="file"] {
      display: none;
    }
    
    .query-filters {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .filter-row {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    
    .filter-group {
      flex: 1;
      min-width: 200px;
    }
    
    .filter-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
    
    .filter-group input,
    .filter-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--secondary);
      color: var(--text);
      font-size: 1rem;
    }
    
    .filter-group input:focus,
    .filter-group select:focus {
      outline: none;
      border-color: var(--highlight);
    }
    
    .btn-filter {
      background: #6c5ce7;
      color: white;
      padding: 10px 20px;
    }
    
    .btn-filter:hover {
      background: #5f4dd1;
      transform: translateY(-2px);
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }
    
    .pagination button {
      padding: 8px 16px;
      background: rgba(255,255,255,0.1);
      color: var(--text);
      border: 1px solid var(--border);
    }
    
    .pagination button:hover:not(:disabled) {
      background: rgba(255,255,255,0.2);
      transform: none;
    }
    
    .pagination button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .pagination .page-info {
      padding: 8px 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
    }
    
    @media (max-width: 768px) {
      h1 {
        font-size: 1.8rem;
      }
      
      .stats-grid {
        grid-template-columns: 1fr;
      }
      
      .actions {
        flex-direction: column;
      }
      
      button {
        width: 100%;
      }
      
      .filter-row {
        flex-direction: column;
      }
      
      .filter-group {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌐 访客追踪系统</h1>
    
    <div class="stats-card">
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="total-visits">0</div>
          <div class="stat-label">总访问次数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="local-visits">0</div>
          <div class="stat-label">本地访问次数</div>
        </div>
      </div>
      
      <div id="message" class="message"></div>
      
      <div class="actions">
        <button class="btn-primary" onclick="exportData()">📥 导出数据</button>
        <button class="btn-secondary" onclick="document.getElementById('import-file').click()">📤 导入数据</button>
        <button class="btn-danger" onclick="clearData()">🗑️ 清空数据</button>
        <input type="file" id="import-file" accept=".json" onchange="importData(event)">
      </div>
    </div>
    
    <div class="records-table">
      <h2 style="margin-bottom: 20px;">📊 最近访问记录</h2>
      
      <div class="query-filters">
        <div class="filter-row">
          <div class="filter-group">
            <label>开始时间</label>
            <input type="datetime-local" id="filter-start-time">
          </div>
          <div class="filter-group">
            <label>结束时间</label>
            <input type="datetime-local" id="filter-end-time">
          </div>
          <div class="filter-group">
            <label>IP地址</label>
            <input type="text" id="filter-ip" placeholder="输入IP地址">
          </div>
          <div class="filter-group">
            <label>访问路径</label>
            <input type="text" id="filter-path" placeholder="输入路径">
          </div>
          <div class="filter-group">
            <label>每页显示</label>
            <select id="filter-limit">
              <option value="10">10条</option>
              <option value="20" selected>20条</option>
              <option value="50">50条</option>
              <option value="100">100条</option>
            </select>
          </div>
          <button class="btn-filter" onclick="applyFilters()">🔍 查询</button>
          <button class="btn-secondary" onclick="resetFilters()">🔄 重置</button>
        </div>
      </div>
      
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>时间</th>
            <th>IP地址</th>
            <th>访问路径</th>
          </tr>
        </thead>
        <tbody id="records-body">
          <tr>
            <td colspan="4" style="text-align: center; opacity: 0.6;">加载中...</td>
          </tr>
        </tbody>
      </table>
      
      <div class="pagination">
        <button onclick="goToPage(currentPage - 1)" id="btn-prev">上一页</button>
        <div class="page-info">
          第 <span id="current-page">1</span> 页，共 <span id="total-pages">1</span> 页
        </div>
        <button onclick="goToPage(currentPage + 1)" id="btn-next">下一页</button>
      </div>
    </div>
  </div>
  
  <div class="visit-counter">
    访问次数: <span id="visit-count">0</span>
  </div>
  
  <script>
    // Local visit counter
    const localCount = parseInt(localStorage.visits || "0") + 1;
    localStorage.visits = localCount;
    document.getElementById("visit-count").textContent = localCount;
    document.getElementById("local-visits").textContent = localCount;
    
    // Pagination state
    let currentPage = 1;
    let totalPages = 1;
    
    // Show message helper
    function showMessage(text, type = 'success') {
      const msgEl = document.getElementById('message');
      msgEl.textContent = text;
      msgEl.className = `message ${type} show`;
      setTimeout(() => {
        msgEl.classList.remove('show');
      }, 5000);
    }
    
    // Build query parameters
    function buildQueryParams() {
      const params = new URLSearchParams();
      
      const startTime = document.getElementById('filter-start-time').value;
      const endTime = document.getElementById('filter-end-time').value;
      const ip = document.getElementById('filter-ip').value.trim();
      const path = document.getElementById('filter-path').value.trim();
      const limit = document.getElementById('filter-limit').value;
      
      if (startTime) params.append('start_time', startTime);
      if (endTime) params.append('end_time', endTime);
      if (ip) params.append('ip', ip);
      if (path) params.append('path', path);
      params.append('limit', limit);
      params.append('page', currentPage);
      
      return params;
    }
    
    // Load statistics
    async function loadStats() {
      try {
        const params = buildQueryParams();
        const response = await fetch(`/api/stats?${params}`);
        if (!response.ok) throw new Error('Failed to load stats');
        
        const data = await response.json();
        document.getElementById('total-visits').textContent = data.total_visits;
        
        // Update pagination
        totalPages = data.total_pages || 1;
        currentPage = data.current_page || 1;
        document.getElementById('current-page').textContent = currentPage;
        document.getElementById('total-pages').textContent = totalPages;
        document.getElementById('btn-prev').disabled = currentPage <= 1;
        document.getElementById('btn-next').disabled = currentPage >= totalPages;
        
        // Update recent records table
        const tbody = document.getElementById('records-body');
        if (data.recent_visits.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; opacity: 0.6;">暂无记录</td></tr>';
        } else {
          tbody.innerHTML = data.recent_visits.map(visit => `
            <tr>
              <td>${visit.id}</td>
              <td>${visit.timestamp}</td>
              <td>${visit.ip}</td>
              <td>${visit.path}</td>
            </tr>
          `).join('');
        }
      } catch (error) {
        console.error('Load stats error:', error);
        showMessage('加载统计数据失败', 'error');
      }
    }
    
    // Apply filters
    function applyFilters() {
      currentPage = 1;
      loadStats();
    }
    
    // Reset filters
    function resetFilters() {
      document.getElementById('filter-start-time').value = '';
      document.getElementById('filter-end-time').value = '';
      document.getElementById('filter-ip').value = '';
      document.getElementById('filter-path').value = '';
      document.getElementById('filter-limit').value = '20';
      currentPage = 1;
      loadStats();
    }
    
    // Go to page
    function goToPage(page) {
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      loadStats();
    }
    
    // Export data
    async function exportData() {
      try {
        const response = await fetch('/api/export');
        if (!response.ok) throw new Error('Export failed');
        
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `visitor_records_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
        
        showMessage('数据导出成功！', 'success');
      } catch (error) {
        console.error('Export error:', error);
        showMessage('导出失败: ' + error.message, 'error');
      }
    }
    
    // Import data
    async function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      try {
        const formData = new FormData();
        formData.append('file', file);
        
        const response = await fetch('/api/import', {
          method: 'POST',
          body: formData
        });
        
        const result = await response.json();
        
        if (!response.ok) {
          throw new Error(result.error || 'Import failed');
        }
        
        showMessage(
          `导入成功！导入 ${result.imported_count} 条，跳过 ${result.skipped_count} 条`,
          'success'
        );
        
        if (result.errors.length > 0) {
          console.warn('Import errors:', result.errors);
        }
        
        // Reload stats
        await loadStats();
        
      } catch (error) {
        console.error('Import error:', error);
        showMessage('导入失败: ' + error.message, 'error');
      } finally {
        // Reset file input
        event.target.value = '';
      }
    }
    
    // Clear data
    async function clearData() {
      if (!confirm('确定要清空所有访问记录吗？此操作不可恢复！')) {
        return;
      }
      
      try {
        const response = await fetch('/api/clear', {
          method: 'POST',
          headers: {
            'X-Clear-Token': 'dev_clear_token_12345'
          }
        });
        
        const result = await response.json();
        
        if (!response.ok) {
          throw new Error(result.error || 'Clear failed');
        }
        
        showMessage(`成功清空 ${result.deleted_count} 条记录`, 'success');
        
        // Reload stats
        await loadStats();
        
      } catch (error) {
        console.error('Clear error:', error);
        showMessage('清空失败: ' + error.message, 'error');
      }
    }
    
    // Initial load
    loadStats();
    
    // Auto refresh every 30 seconds
    setInterval(loadStats, 30000);
  </script>
</body>
</html>
