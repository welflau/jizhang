<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Authentication</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --error: #d93025;
            --success: #1e8e3e;
            --border: #dadce0;
            --bg-gray: #f8f9fa;
            --text-primary: #202124;
            --text-secondary: #5f6368;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            color: var(--primary);
            font-size: 28px;
            font-weight: 600;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            border-bottom: 2px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab:hover {
            color: var(--primary);
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
        }

        .form-group input.error {
            border-color: var(--error);
        }

        .error-message {
            color: var(--error);
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
        }

        .submit-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        .success-message {
            background: var(--success);
            color: white;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .success-message.show {
            display: block;
        }

        .user-info {
            display: none;
            text-align: center;
        }

        .user-info.show {
            display: block;
        }

        .user-info h2 {
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .user-info p {
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .logout-btn {
            margin-top: 24px;
            padding: 12px 24px;
            background: var(--error);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .logout-btn:hover {
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .container {
                padding: 24px;
            }

            .logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🔐 Auth System</h1>
        </div>

        <div id="auth-section">
            <div class="tabs">
                <button class="tab active" data-tab="login">Login</button>
                <button class="tab" data-tab="register">Register</button>
            </div>

            <div class="success-message" id="success-message"></div>

            <!-- Login Form -->
            <div class="form-container active" id="login-form">
                <form id="login">
                    <div class="form-group">
                        <label for="login-identifier">Email or Phone</label>
                        <input type="text" id="login-identifier" name="identifier" required>
                        <div class="error-message" id="login-identifier-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" required>
                        <div class="error-message" id="login-password-error"></div>
                    </div>
                    <button type="submit" class="submit-btn">Login</button>
                </form>
            </div>

            <!-- Register Form -->
            <div class="form-container" id="register-form">
                <form id="register">
                    <div class="form-group">
                        <label for="register-email">Email (optional)</label>
                        <input type="email" id="register-email" name="email">
                        <div class="error-message" id="register-email-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="register-phone">Phone (optional)</label>
                        <input type="tel" id="register-phone" name="phone" placeholder="13800138000">
                        <div class="error-message" id="register-phone-error"></div>
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input type="password" id="register-password" name="password" required>
                        <small style="color: var(--text-secondary); font-size: 12px;">At least 8 characters, include letters and numbers</small>
                        <div class="error-message" id="register-password-error"></div>
                    </div>
                    <button type="submit" class="submit-btn">Register</button>
                </form>
            </div>
        </div>

        <!-- User Info (shown after login) -->
        <div class="user-info" id="user-info">
            <h2>Welcome! 👋</h2>
            <p><strong>User ID:</strong> <span id="user-id"></span></p>
            <p><strong>Email:</strong> <span id="user-email"></span></p>
            <p><strong>Phone:</strong> <span id="user-phone"></span></p>
            <p><strong>Token expires in:</strong> <span id="token-expiry"></span></p>
            <button class="logout-btn" id="logout-btn">Logout</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/auth';
        const TOKEN_KEY = 'auth_token';
        const USER_KEY = 'user_data';

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const targetTab = tab.dataset.tab;
                
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
                
                tab.classList.add('active');
                document.getElementById(`${targetTab}-form`).classList.add('active');
                
                clearMessages();
            });
        });

        // Register form handler
        document.getElementById('register').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();

            const email = document.getElementById('register-email').value.trim();
            const phone = document.getElementById('register-phone').value.trim();
            const password = document.getElementById('register-password').value;

            if (!email && !phone) {
                showError('register-email', 'Please provide either email or phone');
                return;
            }

            const payload = { password };
            if (email) payload.email = email;
            if (phone) payload.phone = phone;

            try {
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    if (data.detail) {
                        if (Array.isArray(data.detail)) {
                            data.detail.forEach(err => {
                                const field = err.loc[err.loc.length - 1];
                                showError(`register-${field}`, err.msg);
                            });
                        } else {
                            showError('register-email', data.detail);
                        }
                    }
                    return;
                }

                showSuccess('Registration successful! Please login.');
                document.getElementById('register').reset();
                
                setTimeout(() => {
                    document.querySelector('[data-tab="login"]').click();
                }, 1500);

            } catch (error) {
                showError('register-email', 'Network error. Please try again.');
            }
        });

        // Login form handler
        document.getElementById('login').addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();

            const identifier = document.getElementById('login-identifier').value.trim();
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError('login-password', data.detail || 'Login failed');
                    return;
                }

                // Store token and show user info
                localStorage.setItem(TOKEN_KEY, data.access_token);
                
                // Decode JWT to get user info (simple base64 decode)
                const payload = JSON.parse(atob(data.access_token.split('.')[1]));
                localStorage.setItem(USER_KEY, JSON.stringify(payload));

                showUserInfo(payload, data.expires_in);

            } catch (error) {
                showError('login-password', 'Network error. Please try again.');
            }
        });

        // Logout handler
        document.getElementById('logout-btn').addEventListener('click', async () => {
            try {
                await fetch(`${API_BASE}/logout`, { method: 'POST' });
            } catch (error) {
                console.error('Logout request failed:', error);
            }
            
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(USER_KEY);
            
            document.getElementById('user-info').classList.remove('show');
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('login').reset();
        });

        // Helper functions
        function showError(fieldId, message) {
            const errorEl = document.getElementById(`${fieldId}-error`);
            const inputEl = document.getElementById(fieldId);
            
            errorEl.textContent = message;
            errorEl.classList.add('show');
            inputEl.classList.add('error');
        }

        function showSuccess(message) {
            const successEl = document.getElementById('success-message');
            successEl.textContent = message;
            successEl.classList.add('show');
        }

        function clearMessages() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
            document.querySelectorAll('input').forEach(el => el.classList.remove('error'));
            document.getElementById('success-message').classList.remove('show');
        }

        function showUserInfo(userData, expiresIn) {
            document.getElementById('user-id').textContent = userData.sub;
            document.getElementById('user-email').textContent = userData.email || 'N/A';
            document.getElementById('user-phone').textContent = userData.phone || 'N/A';
            document.getElementById('token-expiry').textContent = `${Math.floor(expiresIn / 60)} minutes`;
            
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('user-info').classList.add('show');
        }

        // Check if user is already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem(TOKEN_KEY);
            const userData = localStorage.getItem(USER_KEY);
            
            if (token && userData) {
                try {
                    const user = JSON.parse(userData);
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    
                    // Check if token is expired
                    if (payload.exp * 1000 > Date.now()) {
                        const expiresIn = payload.exp - Math.floor(Date.now() / 1000);
                        showUserInfo(user, expiresIn);
                    } else {
                        localStorage.removeItem(TOKEN_KEY);
                        localStorage.removeItem(USER_KEY);
                    }
                } catch (error) {
                    localStorage.removeItem(TOKEN_KEY);
                    localStorage.removeItem(USER_KEY);
                }
            }
        });
    </script>
</body>
</html>
