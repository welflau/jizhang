<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图标选择器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f3460;
            --highlight: #e94560;
            --text: #f1f1f1;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            color: var(--highlight);
        }
        
        .icon-selector-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .search-section {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text);
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--highlight);
            background: rgba(255, 255, 255, 0.12);
        }
        
        .search-input::placeholder {
            color: rgba(241, 241, 241, 0.5);
        }
        
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 16px;
            border-radius: 8px;
        }
        
        .color-picker-label {
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        .color-picker {
            width: 50px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .color-picker:hover {
            border-color: var(--highlight);
            transform: scale(1.05);
        }
        
        .color-input {
            width: 100px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.9em;
            text-align: center;
        }
        
        .color-input:focus {
            outline: none;
            border-color: var(--highlight);
        }
        
        .filter-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }
        
        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--highlight);
        }
        
        .filter-btn.active {
            background: var(--highlight);
            border-color: var(--highlight);
            font-weight: 600;
        }
        
        .preview-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .preview-icon {
            font-size: 4em;
            transition: all 0.3s ease;
        }
        
        .preview-info {
            flex: 1;
            margin-left: 30px;
        }
        
        .preview-name {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--highlight);
        }
        
        .preview-code {
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            opacity: 0.8;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 12px;
            border-radius: 4px;
            display: inline-block;
        }
        
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        
        .icon-grid::-webkit-scrollbar {
            width: 8px;
        }
        
        .icon-grid::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        
        .icon-grid::-webkit-scrollbar-thumb {
            background: var(--highlight);
            border-radius: 4px;
        }
        
        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            aspect-ratio: 1;
        }
        
        .icon-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--highlight);
            transform: translateY(-3px);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3);
        }
        
        .icon-item.selected {
            background: rgba(233, 69, 96, 0.2);
            border-color: var(--highlight);
        }
        
        .icon-item i {
            font-size: 2em;
            margin-bottom: 8px;
        }
        
        .icon-name {
            font-size: 0.7em;
            text-align: center;
            opacity: 0.8;
            word-break: break-word;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .btn-primary {
            background: var(--highlight);
            color: white;
        }
        
        .btn-primary:hover {
            background: #d63651;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
        }
        
        .btn-secondary {
            background: var(--accent);
            color: white;
        }
        
        .btn-secondary:hover {
            background: #0d2a4d;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        .message {
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }
        
        .message.success {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }
        
        .message.error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }
        
        .message.info {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid #3498db;
            color: #3498db;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .search-section {
                flex-direction: column;
            }
            
            .search-input {
                width: 100%;
            }
            
            .icon-grid {
                grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
                gap: 10px;
            }
            
            .preview-section {
                flex-direction: column;
                text-align: center;
            }
            
            .preview-info {
                margin-left: 0;
                margin-top: 20px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>图标选择器</h1>
        
        <div class="icon-selector-wrapper">
            <div class="search-section">
                <input 
                    type="text" 
                    class="search-input" 
                    id="search-input" 
                    placeholder="搜索图标... (例如: home, user, heart)"
                    autocomplete="off"
                >
                
                <div class="color-picker-wrapper">
                    <span class="color-picker-label">颜色:</span>
                    <input 
                        type="color" 
                        class="color-picker" 
                        id="color-picker" 
                        value="#e94560"
                    >
                    <input 
                        type="text" 
                        class="color-input" 
                        id="color-input" 
                        value="#e94560"
                        maxlength="7"
                    >
                </div>
            </div>
            
            <div class="filter-section">
                <button class="filter-btn active" data-category="all">全部</button>
                <button class="filter-btn" data-category="solid">实心</button>
                <button class="filter-btn" data-category="regular">常规</button>
                <button class="filter-btn" data-category="brands">品牌</button>
            </div>
            
            <div class="preview-section">
                <i class="preview-icon fas fa-icons" id="preview-icon"></i>
                <div class="preview-info">
                    <div class="preview-name" id="preview-name">未选择图标</div>
                    <div class="preview-code" id="preview-code">&lt;i class="fas fa-icons"&gt;&lt;/i&gt;</div>
                </div>
            </div>
            
            <div class="stats-bar">
                <span>共 <span id="total-icons">0</span> 个图标</span>
                <span>显示 <span id="visible-icons">0</span> 个</span>
            </div>
            
            <div class="icon-grid" id="icon-grid">
                <!-- Icons will be dynamically loaded here -->
            </div>
            
            <div class="action-buttons">
                <button class="btn btn-primary" id="confirm-btn" onclick="confirmSelection()" disabled>确认选择</button>
                <button class="btn btn-secondary" onclick="copyCode()">复制代码</button>
                <button class="btn btn-secondary" onclick="resetSelection()">重置</button>
            </div>
            
            <div id="message" class="message"></div>
        </div>
    </div>
    
    <script>
        // Icon database (subset of Font Awesome icons)
        const iconDatabase = {
            solid: [
                'home', 'user', 'heart', 'star', 'search', 'envelope', 'phone', 'calendar',
                'camera', 'music', 'video', 'image', 'file', 'folder', 'download', 'upload',
                'trash', 'edit', 'save', 'print', 'share', 'link', 'lock', 'unlock',
                'key', 'bell', 'bookmark', 'tag', 'flag', 'map', 'location-dot', 'compass',
                'clock', 'hourglass', 'stopwatch', 'timer', 'chart-bar', 'chart-line', 'chart-pie',
                'shopping-cart', 'credit-card', 'money-bill', 'gift', 'trophy', 'medal', 'award',
                'thumbs-up', 'thumbs-down', 'comment', 'comments', 'message', 'inbox', 'paper-plane',
                'cloud', 'cloud-upload', 'cloud-download', 'database', 'server', 'cog', 'wrench',
                'hammer', 'screwdriver', 'tools', 'shield', 'fire', 'bolt', 'sun', 'moon',
                'circle', 'square', 'triangle-exclamation', 'circle-info', 'circle-check', 'circle-xmark'
            ],
            regular: [
                'heart', 'star', 'bookmark', 'calendar', 'clock', 'comment', 'envelope',
                'file', 'folder', 'image', 'user', 'bell', 'circle', 'square',
                'face-smile', 'face-frown', 'face-meh', 'thumbs-up', 'thumbs-down'
            ],
            brands: [
                'github', 'twitter', 'facebook', 'instagram', 'linkedin', 'youtube', 'google',
                'apple', 'microsoft', 'amazon', 'spotify', 'discord', 'telegram', 'whatsapp',
                'reddit', 'pinterest', 'tiktok', 'snapchat', 'twitch', 'steam'
            ]
        };
        
        let selectedIcon = null;
        let currentColor = '#e94560';
        let currentCategory = 'all';
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadIcons();
            setupEventListeners();
            updateStats();
        });
        
        // Setup event listeners
        function setupEventListeners() {
            const searchInput = document.getElementById('search-input');
            const colorPicker = document.getElementById('color-picker');
            const colorInput = document.getElementById('color-input');
            const filterBtns = document.querySelectorAll('.filter-btn');
            
            searchInput.addEventListener('input', debounce(filterIcons, 300));
            
            colorPicker.addEventListener('input', (e) => {
                currentColor = e.target.value;
                colorInput.value = currentColor;
                updateIconColors();
            });
            
            colorInput.addEventListener('input', (e) => {
                const value = e.target.value;
                if (/^#[0-9A-Fa-f]{6}$/.test(value)) {
                    currentColor = value;
                    colorPicker.value = currentColor;
                    updateIconColors();
                }
            });
            
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    loadIcons();
                });
            });
        }
        
        // Load icons based on category
        function loadIcons() {
            const grid = document.getElementById('icon-grid');
            grid.innerHTML = '';
            
            let icons = [];
            if (currentCategory === 'all') {
                icons = [
                    ...iconDatabase.solid.map(name => ({name, prefix: 'fas'})),
                    ...iconDatabase.regular.map(name => ({name, prefix: 'far'})),
                    ...iconDatabase.brands.map(name => ({name, prefix: 'fab'}))
                ];
            } else if (currentCategory === 'solid') {
                icons = iconDatabase.solid.map(name => ({name, prefix: 'fas'}));
            } else if (currentCategory === 'regular') {
                icons = iconDatabase.regular.map(name => ({name, prefix: 'far'}));
            } else if (currentCategory === 'brands') {
                icons = iconDatabase.brands.map(name => ({name, prefix: 'fab'}));
            }
            
            icons.forEach(icon => {
                const item = createIconItem(icon.name, icon.prefix);
                grid.appendChild(item);
            });
            
            updateStats();
        }
        
        // Create icon item element
        function createIconItem(name, prefix) {
            const item = document.createElement('div');
            item.className = 'icon-item';
            item.dataset.name = name;
            item.dataset.prefix = prefix;
            
            const iconEl = document.createElement('i');
            iconEl.className = `${prefix} fa-${name}`;
            iconEl.style.color = currentColor;
            
            const nameEl = document.createElement('div');
            nameEl.className = 'icon-name';
            nameEl.textContent = name;
            
            item.appendChild(iconEl);
            item.appendChild(nameEl);
            
            item.addEventListener('click', () => selectIcon(item, name, prefix));
            
            return item;
        }
        
        // Select icon
        function selectIcon(element, name, prefix) {
            document.querySelectorAll('.icon-item').forEach(item => {
                item.classList.remove('selected');
            });
            
            element.classList.add('selected');
            selectedIcon = {name, prefix};
            
            const previewIcon = document.getElementById('preview-icon');
            previewIcon.className = `preview-icon ${prefix} fa-${name}`;
            previewIcon.style.color = currentColor;
            
            document.getElementById('preview-name').textContent = name;
            document.getElementById('preview-code').textContent = `<i class="${prefix} fa-${name}"></i>`;
            
            document.getElementById('confirm-btn').disabled = false;
            
            showMessage(`已选择图标: ${name}`, 'success');
        }
        
        // Filter icons based on search
        function filterIcons() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const items = document.querySelectorAll('.icon-item');
            
            let visibleCount = 0;
            items.forEach(item => {
                const name = item.dataset.name;
                if (name.includes(searchTerm)) {
                    item.style.display = 'flex';
                    visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });
            
            document.getElementById('visible-icons').textContent = visibleCount;
        }
        
        // Update icon colors
        function updateIconColors() {
            document.querySelectorAll('.icon-item i').forEach(icon => {
                icon.style.color = currentColor;
            });
            
            const previewIcon = document.getElementById('preview-icon');
            previewIcon.style.color = currentColor;
        }
        
        // Update statistics
        function updateStats() {
            const totalIcons = document.querySelectorAll('.icon-item').length;
            document.getElementById('total-icons').textContent = totalIcons;
            document.getElementById('visible-icons').textContent = totalIcons;
        }
        
        // Confirm selection
        function confirmSelection() {
            if (!selectedIcon) {
                showMessage('请先选择一个图标', 'error');
                return;
            }
            
            const result = {
                name: selectedIcon.name,
                prefix: selectedIcon.prefix,
                color: currentColor,
                code: `<i class="${selectedIcon.prefix} fa-${selectedIcon.name}" style="color: ${currentColor}"></i>`
            };
            
            console.log('Selected icon:', result);
            showMessage(`已确认选择: ${selectedIcon.name}`, 'success');
            
            // You can emit an event or call a callback here
            if (window.onIconSelected) {
                window.onIconSelected(result);
            }
        }
        
        // Copy code to clipboard
        function copyCode() {
            if (!selectedIcon) {
                showMessage('请先选择一个图标', 'error');
                return;
            }
            
            const code = `<i class="${selectedIcon.prefix} fa-${selectedIcon.name}" style="color: ${currentColor}"></i>`;
            
            navigator.clipboard.writeText(code).then(() => {
                showMessage('代码已复制到剪贴板', 'success');
            }).catch(() => {
                showMessage('复制失败，请手动复制', 'error');
            });
        }
        
        // Reset selection
        function resetSelection() {
            document.querySelectorAll('.icon-item').forEach(item => {
                item.classList.remove('selected');
            });
            
            selectedIcon = null;
            
            const previewIcon = document.getElementById('preview-icon');
            previewIcon.className = 'preview-icon fas fa-icons';
            previewIcon.style.color = currentColor;
            
            document.getElementById('preview-name').textContent = '未选择图标';
            document.getElementById('preview-code').textContent = '<i class="fas fa-icons"></i>';
            document.getElementById('confirm-btn').disabled = true;
            
            document.getElementById('search-input').value = '';
            filterIcons();
            
            showMessage('已重置选择', 'info');
        }
        
        // Show message
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';
            
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 3000);
        }
        
        // Debounce utility
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
    </script>
</body>
</html>
