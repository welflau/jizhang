<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      .travel-primary { fill: #e94560; }
      .travel-secondary { fill: #0f3460; }
      .travel-accent { fill: #f1f1f1; }
    </style>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" class="travel-secondary" opacity="0.1"/>
  
  <!-- Airplane body -->
  <path class="travel-primary" d="M32 12 L48 32 L32 28 L16 32 Z"/>
  
  <!-- Airplane wings -->
  <path class="travel-primary" d="M32 28 L20 24 L18 26 L28 30 Z"/>
  <path class="travel-primary" d="M32 28 L44 24 L46 26 L36 30 Z"/>
  
  <!-- Airplane tail -->
  <path class="travel-secondary" d="M32 28 L32 38 L28 36 L32 28 L36 36 Z"/>
  
  <!-- Globe outline -->
  <circle cx="32" cy="44" r="12" class="travel-accent" fill="none" stroke-width="2" stroke="#0f3460"/>
  
  <!-- Globe latitude lines -->
  <ellipse cx="32" cy="44" rx="12" ry="4" class="travel-secondary" fill="none" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="32" cy="44" rx="12" ry="8" class="travel-secondary" fill="none" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Globe longitude line -->
  <path class="travel-secondary" d="M32 32 Q26 44 32 56 Q38 44 32 32" fill="none" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Travel path dots -->
  <circle cx="24" cy="18" r="1.5" class="travel-primary" opacity="0.8"/>
  <circle cx="28" cy="16" r="1.5" class="travel-primary" opacity="0.6"/>
  <circle cx="36" cy="16" r="1.5" class="travel-primary" opacity="0.6"/>
  <circle cx="40" cy="18" r="1.5" class="travel-primary" opacity="0.8"/>
</svg>