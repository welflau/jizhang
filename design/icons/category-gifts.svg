<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Gift box base -->
  <rect x="12" y="28" width="40" height="28" rx="2" fill="#e94560" stroke="#e94560" opacity="0.9"/>
  
  <!-- Gift box lid -->
  <rect x="10" y="22" width="44" height="8" rx="2" fill="#d63651" stroke="#d63651"/>
  
  <!-- Ribbon vertical -->
  <rect x="30" y="22" width="4" height="34" fill="#f1f1f1" stroke="#f1f1f1"/>
  
  <!-- Ribbon horizontal -->
  <rect x="12" y="32" width="40" height="4" fill="#f1f1f1" stroke="#f1f1f1"/>
  
  <!-- Bow left loop -->
  <path d="M 32 22 Q 22 12 18 18 Q 16 22 20 24 Q 26 26 32 22" fill="#f1f1f1" stroke="#f1f1f1"/>
  
  <!-- Bow right loop -->
  <path d="M 32 22 Q 42 12 46 18 Q 48 22 44 24 Q 38 26 32 22" fill="#f1f1f1" stroke="#f1f1f1"/>
  
  <!-- Bow center knot -->
  <circle cx="32" cy="22" r="3" fill="#f1f1f1" stroke="#f1f1f1"/>
  
  <!-- Bow ribbons hanging -->
  <path d="M 30 22 L 26 16" stroke="#f1f1f1" stroke-width="2" fill="none"/>
  <path d="M 34 22 L 38 16" stroke="#f1f1f1" stroke-width="2" fill="none"/>
  
  <!-- Decorative dots on box -->
  <circle cx="20" cy="42" r="1.5" fill="#f1f1f1" opacity="0.6"/>
  <circle cx="44" cy="42" r="1.5" fill="#f1f1f1" opacity="0.6"/>
  <circle cx="20" cy="48" r="1.5" fill="#f1f1f1" opacity="0.6"/>
  <circle cx="44" cy="48" r="1.5" fill="#f1f1f1" opacity="0.6"/>
</svg>