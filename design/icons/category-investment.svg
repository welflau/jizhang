<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      .icon-primary { fill: #e94560; }
      .icon-secondary { fill: #0f3460; }
      .icon-accent { fill: #1a1a2e; }
    </style>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" class="icon-secondary" opacity="0.1"/>
  
  <!-- Investment Growth Chart -->
  <path class="icon-primary" d="M 12 45 L 12 48 L 52 48 L 52 45 Z"/>
  <path class="icon-primary" d="M 16 42 L 20 42 L 20 45 L 16 45 Z"/>
  <path class="icon-primary" d="M 24 38 L 28 38 L 28 45 L 24 45 Z"/>
  <path class="icon-primary" d="M 32 32 L 36 32 L 36 45 L 32 45 Z"/>
  <path class="icon-primary" d="M 40 26 L 44 26 L 44 45 L 40 45 Z"/>
  
  <!-- Upward Arrow -->
  <path class="icon-accent" d="M 48 20 L 52 24 L 50 24 L 50 32 L 46 32 L 46 24 L 44 24 Z"/>
  
  <!-- Dollar Sign -->
  <g class="icon-secondary">
    <path d="M 18 16 Q 18 14 20 14 L 22 14 Q 24 14 24 16 L 24 18 Q 24 20 22 20 L 20 20 Q 18 20 18 18 Z"/>
    <rect x="20" y="12" width="2" height="3"/>
    <rect x="20" y="20" width="2" height="3"/>
  </g>
  
  <!-- Coin Stack -->
  <ellipse cx="20" cy="28" rx="6" ry="2" class="icon-accent" opacity="0.3"/>
  <ellipse cx="20" cy="26" rx="6" ry="2" class="icon-accent" opacity="0.5"/>
  <ellipse cx="20" cy="24" rx="6" ry="2" class="icon-secondary"/>
</svg>