  <path class="coffee-secondary" d="M32 16 Q30 12 32 8" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path class="coffee-secondary" d="M40 18 Q38 14 40 10" fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  
