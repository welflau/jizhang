  <rect x="16" y="27" width="3" height="2" fill="url(#entertainmentGradient)"/>
  <rect x="16" y="33" width="3" height="2" fill="url(#entertainmentGradient)"/>
  <rect x="16" y="39" width="3" height="2" fill="url(#entertainmentGradient)"/>
  
  <!-- Film strip holes - right side -->
  <rect x="45" y="21" width="3" height="2" fill="url(#entertainmentGradient)"/>
  <rect x="45" y="27" width="3" height="2" fill="url(#entertainmentGradient)"/>
  <rect x="45" y="33" width="3" height="2" fill="url(#entertainmentGradient)"/>
  <rect x="45" y="39" width="3" height="2" fill="url(#entertainmentGradient)"/>
  
  <!-- Play button triangle -->
  <path d="M 28 26 L 28 38 L 38 32 Z" fill="url(#entertainmentGradient)"/>
  
