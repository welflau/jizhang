# asset_manifest.yaml — E2E: Test data backup and restore workflow
# 由美术 Agent 完整生成，覆盖 UX Agent 的初稿
# status: pending=待生产 / sourced=已从资产库获取 / generated=已AI生成
assets:
  - id: download
    type: icon
    description: Download/Export icon 24px outline
    source_hint: iconify:lucide:download
    status: pending
  - id: upload
    type: icon
    description: Upload/Import icon 24px outline
    source_hint: iconify:lucide:upload
    status: pending
  - id: trash
    type: icon
    description: Delete/Clear icon 24px outline
    source_hint: iconify:lucide:trash-2
    status: pending
  - id: check_circle
    type: icon
    description: Success icon 20px filled
    source_hint: iconify:lucide:check-circle
    status: pending
  - id: alert_circle
    type: icon
    description: Error icon 20px filled
    source_hint: iconify:lucide:alert-circle
    status: pending
  - id: alert_triangle
    type: icon
    description: Warning icon 20px filled
    source_hint: iconify:lucide:alert-triangle
    status: pending
  - id: x
    type: icon
    description: Close icon 16px outline
    source_hint: iconify:lucide:x
    status: pending
  - id: loader
    type: icon
    description: Loading spinner 24px outline
    source_hint: iconify:lucide:loader-2
    status: pending
  - id: file_json
    type: icon
    description: JSON file icon 48px outline
    source_hint: iconify:lucide:file-json
    status: pending
  - id: database
    type: icon
    description: Data/Storage icon 24px outline
    source_hint: iconify:lucide:database
    status: pending
  - id: empty_state_no_data
    type: icon
    description: Empty state illustration when no visit data exists, 400x300px, minimalist style with database/folder icon, muted colors
    source_hint: ai_generate
    status: pending
  - id: upload_area_placeholder
    type: icon
    description: Upload area placeholder illustration, 200x150px, cloud upload concept, light gray tones
    source_hint: ai_generate
    status: pending