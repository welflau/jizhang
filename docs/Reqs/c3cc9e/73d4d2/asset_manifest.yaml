    status: pending
  - id: auth_refresh
    type: icon
    description: Refresh token button icon, 16px, outline style
    source_hint: iconify:heroicons:arrow-path
    status: pending
  - id: auth_shield_check
    type: icon
    description: Security badge icon, 20px, outline style
