  - id: auth_clock
    type: icon
    description: Token expiration timer icon, 14-16px, outline style
    source_hint: iconify:heroicons:clock
    status: pending
  - id: auth_alert_circle
    type: icon
    description: Error message icon, 20px, outline style
    source_hint: iconify:heroicons:exclamation-circle
