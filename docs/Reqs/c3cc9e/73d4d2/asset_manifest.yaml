    status: pending
  - id: auth_expired_token
    type: illustration
    description: Illustration for token expiration state, 300x200, warning color theme
    source_hint: ai_generate
    status: pending
  - id: auth_unauthorized
    type: illustration
    description: 401 error page illustration, 400x300, error color theme with lock icon
