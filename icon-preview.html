<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图标预览 - 分类图标集合</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f3460;
            --highlight: #e94560;
            --text: #f1f1f1;
            --success: #2ecc71;
            --warning: #f39c12;
            --info: #3498db;
            --danger: #e74c3c;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5em;
            color: var(--highlight);
        }
        
        .subtitle {
            text-align: center;
            margin-bottom: 40px;
            opacity: 0.8;
            font-size: 1.1em;
        }
        
        .section {
            margin-bottom: 50px;
        }
        
        .section-title {
            font-size: 1.8em;
            margin-bottom: 25px;
            color: var(--highlight);
            border-bottom: 2px solid rgba(233, 69, 96, 0.3);
            padding-bottom: 10px;
        }
        
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .icon-card {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .icon-card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }
        
        .icon-wrapper {
            width: 64px;
            height: 64px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .icon-wrapper svg {
            width: 100%;
            height: 100%;
        }
        
        .icon-name {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .icon-code {
            font-size: 0.75em;
            opacity: 0.6;
            font-family: 'Courier New', monospace;
        }
        
        .color-palette {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .color-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .color-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }
        
        .color-preview {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .color-info {
            padding: 15px;
        }
        
        .color-name {
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        
        .contrast-info {
            font-size: 0.85em;
            opacity: 0.7;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .usage-examples {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .example-card {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 8px;
        }
        
        .example-title {
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--highlight);
        }
        
        .example-content {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
        }
        
        .example-icon {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--highlight);
            color: white;
        }
        
        .btn-primary:hover {
            background: #d63651;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(233, 69, 96, 0.4);
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .icon-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 15px;
            }
            
            .color-palette {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        <!-- 使用示例 -->
        <div class="section">

    </div>

        // 渲染图标网格
        function renderIcons() {
            const grid = document.getElementById('icon-grid');
            icons.forEach(icon => {
                const card = document.createElement('div');
                card.className = 'icon-card';
                card.innerHTML = `
                    <div class="icon-wrapper" style="color: var(--highlight);">
                        ${icon.svg}
                    </div>
                    <div class="icon-name">${icon.name}</div>
                    <div class="icon-code">${icon.code}</div>
                `;
                card.onclick = () => copyIconSVG(icon);
                grid.appendChild(card);
            });
        }

        function renderColors() {
            const palette = document.getElementById('color-palette');

                const textColor = needsDarkText(color.value) ? '#000' : '#fff';

                    <div class="color-preview" style="background-color: ${color.value}; color: ${textColor};">
                        ${color.value}
                    </div>
                    <div class="color-info">

                        <div class="color-value">${color.variable}</div>
