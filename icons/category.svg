    <text x="70" y="50" text-anchor="middle" fill="#1a1a2e" font-size="12">Warning</text>
    <text x="70" y="68" text-anchor="middle" fill="#1a1a2e" font-size="10">#f39c12</text>
  </g>
  
  <!-- Text Colors -->
