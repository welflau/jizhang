  <!-- Contrast Ratio Info -->
  <text x="400" y="1050" text-anchor="middle" fill="#f1f1f1" font-size="14">All color combinations meet WCAG AA standards (4.5:1 contrast ratio)</text>
  <text x="400" y="1075" text-anchor="middle" fill="#f1f1f1" font-size="14">Highlight color meets AAA standards (7:1 contrast ratio) on dark backgrounds</text>
  
  <!-- Usage Notes -->
