    <rect x="0" y="0" width="140" height="80" fill="#f1f1f1" rx="8"/>
    <text x="70" y="50" text-anchor="middle" fill="#1a1a2e" font-size="12">Text Primary</text>
    <text x="70" y="68" text-anchor="middle" fill="#1a1a2e" font-size="10">#f1f1f1</text>
  </g>
  
  <g transform="translate(210, 930)">
    <rect x="0" y="0" width="140" height="80" fill="#c0c0c0" rx="8"/>
    <text x="70" y="50" text-anchor="middle" fill="#1a1a2e" font-size="12">Text Secondary</text>
    <text x="70" y="68" text-anchor="middle" fill="#1a1a2e" font-size="10">#c0c0c0</text>
