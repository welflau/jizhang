  <text x="50" y="1140" fill="#f1f1f1" font-size="11">• Icons are designed with 2px stroke width for optimal visibility</text>
  <text x="50" y="1160" fill="#f1f1f1" font-size="11">• Recommended icon size: 24x24px minimum for accessibility</text>
  <text x="50" y="1180" fill="#f1f1f1" font-size="11">• All icons support scaling without quality loss (vector format)</text>
