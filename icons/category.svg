    <path class="icon-stroke" d="M30 60 L60 35 L90 60 L90 85 L30 85 Z M50 85 L50 70 L70 70 L70 85"/>
    <text x="60" y="110" text-anchor="middle" class="label-text">Home</text>
  </g>
  
  <!-- 2. User -->
  <g transform="translate(210, 80)">
